<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body{margin:0;background:#06000f;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;}
canvas{display:block;border-radius:8px;}
#info{color:#555;font-size:12px;font-family:monospace;margin-top:6px;text-align:center;}
</style>
</head>
<body>
<canvas id="c" width="480" height="580"></canvas>
<div id="info">← → 이동 · 스페이스 발사 · Z 대시(엔진) · M 음소거</div>
<script>
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
const W=480,H=580;
let state='start',score=0,hi=0,frame=0;
let bullets=[],enemies=[],parts=[],particles=[],stars=[],cityLights=[];
let keys={},touchX=null,shootCD=0;
let muted=false,bgmPlaying=false,bgmInterval=null,bgmMode='normal';
let bgmMelIdx=0,bgmBsIdx=0,bgmMelStep=0,bgmBsStep=0;
let wave=0;

let AC=null;
function getAC(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();return AC;}
function beep(freq,type,dur,vol=0.3,detune=0,delay=0){
  if(muted)return;
  try{const ac=getAC();const t=ac.currentTime+delay;
    const o=ac.createOscillator(),g=ac.createGain();
    o.connect(g);g.connect(ac.destination);
    o.type=type;o.frequency.value=freq;o.detune.value=detune;
    g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    o.start(t);o.stop(t+dur);
  }catch(e){}
}
function noise(dur,vol=0.4,delay=0){
  if(muted)return;
  try{const ac=getAC();const t=ac.currentTime+delay;
    const buf=ac.createBuffer(1,ac.sampleRate*dur,ac.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,1.4);
    const s=ac.createBufferSource(),g=ac.createGain();
    s.buffer=buf;s.connect(g);g.connect(ac.destination);
    g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    s.start(t);
  }catch(e){}
}
function sfxShoot(){beep(600,'square',0.09,0.35);beep(420,'square',0.06,0.2,60);}
function sfxShootPower(){beep(700,'square',0.1,0.38);beep(500,'square',0.07,0.22,80);beep(300,'sawtooth',0.06,0.18);}
function sfxExplode(){noise(0.22,0.45);beep(120,'sawtooth',0.18,0.25);}
function sfxBigExplode(){noise(0.5,0.6);beep(80,'sawtooth',0.4,0.4);beep(55,'sawtooth',0.3,0.3,0,0.1);}
function sfxFinalExplode(){for(let i=0;i<4;i++)noise(0.6,0.55,i*0.15);[80,60,45,30].forEach((f,i)=>beep(f,'sawtooth',0.5,0.4,0,i*0.15));}
function sfxPickup(){[440,554,660,880].forEach((f,i)=>beep(f,'triangle',0.12,0.22,0,i*0.06));}
function sfxHit(){beep(200,'sawtooth',0.18,0.45);beep(130,'square',0.12,0.3,-200,0.05);}
function sfxBossAppear(){[55,73,87,110,146].forEach((f,i)=>beep(f,'sawtooth',0.4,0.35,0,i*0.08));beep(220,'square',0.6,0.25,0,0.5);}

const BPM_N=138,BPM_B=160;
function stepLen(bpm){return 60/bpm/2;}
const melodyN=[[440,2],[392,1],[349,1],[392,2],[440,2],[440,4],[392,2],[392,2],[349,2],[330,2],[392,4],[440,2],[523,2],[494,2],[466,2],[440,4],[349,2],[392,2],[440,4],[392,4],[523,2],[494,2],[440,2],[392,2],[349,4],[392,2],[440,2],[494,2],[523,2],[587,4],[523,2],[494,2],[466,2],[440,2],[392,4],[349,2],[392,4],[440,4],[392,4]];
const bassN=[[110,4],[110,4],[131,4],[131,4],[98,4],[98,4],[110,4],[110,4],[131,4],[131,4],[110,4],[98,4],[87,4],[87,4],[98,4],[110,4]];
const melodyB=[[220,1],[220,1],[262,2],[220,2],[196,2],[175,2],[196,2],[220,4],[262,2],[294,2],[330,2],[294,2],[262,2],[220,2],[196,4],[175,4],[220,1],[220,1],[262,2],[294,2],[330,2],[349,2],[330,2],[294,2],[262,2],[220,2],[196,4],[175,2],[196,2],[220,2],[262,2],[294,4],[262,2],[294,2],[330,4],[294,4]];
const bassB=[[55,2],[55,2],[65,4],[49,2],[49,2],[55,4],[65,2],[65,2],[73,4],[55,2],[55,2],[49,4]];

function playBGMNote(freq,dur,vol,type,bpm){
  if(muted||!bgmPlaying)return;
  try{const ac=getAC();const sl=stepLen(bpm);
    const o=ac.createOscillator(),g=ac.createGain();
    o.connect(g);g.connect(ac.destination);
    o.type=type;o.frequency.value=freq;
    g.gain.setValueAtTime(vol,ac.currentTime);
    g.gain.setValueAtTime(vol*0.25,ac.currentTime+dur*sl*0.65);
    g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+dur*sl*0.95);
    o.start(ac.currentTime);o.stop(ac.currentTime+dur*sl);
  }catch(e){}
}
function bgmTick(){
  if(!bgmPlaying||muted)return;
  const isBoss=bgmMode==='boss';
  const mel=isBoss?melodyB:melodyN,bas=isBoss?bassB:bassN,bpm=isBoss?BPM_B:BPM_N;
  const vm=isBoss?0.1:0.08,vb=isBoss?0.14:0.11;
  if(bgmMelStep<=0){const[f,d]=mel[bgmMelIdx%mel.length];playBGMNote(f,d,vm,'square',bpm);if(isBoss)playBGMNote(f*1.5,d,vm*0.5,'square',bpm);bgmMelStep=d;bgmMelIdx++;}
  bgmMelStep--;
  if(bgmBsStep<=0){const[f,d]=bas[bgmBsIdx%bas.length];playBGMNote(f,d,vb,'triangle',bpm);playBGMNote(f*2,d,vb*0.4,'sawtooth',bpm);bgmBsStep=d;bgmBsIdx++;}
  bgmBsStep--;
}
function startBGM(mode='normal'){
  stopBGM();bgmMode=mode;bgmPlaying=true;bgmMelIdx=0;bgmBsIdx=0;bgmMelStep=0;bgmBsStep=0;
  bgmInterval=setInterval(bgmTick,stepLen(mode==='boss'?BPM_B:BPM_N)*1000);
}
function stopBGM(){bgmPlaying=false;if(bgmInterval)clearInterval(bgmInterval);}

for(let i=0;i<120;i++)stars.push({x:Math.random()*W,y:Math.random()*H,s:Math.random()*1.2+0.3,sp:Math.random()*0.5+0.2,b:Math.random()});
for(let i=0;i<30;i++)cityLights.push({x:Math.random()*W,y:H-Math.random()*60-10,w:Math.random()*3+1,h:Math.random()*20+5,c:['#0ff','#f0f','#0af','#f04'][Math.floor(Math.random()*4)],blink:Math.random()*60|0});

const plane={x:W/2,y:H-90,wing:0,engine:0,turret:0,speed:3,hp:3,maxHp:3,invincible:0,dashCD:0,dashing:0};

function rpx(n){return Math.round(n);}
function neon(col,blur=8){ctx.shadowColor=col;ctx.shadowBlur=blur;}
function noNeon(){ctx.shadowBlur=0;ctx.globalAlpha=1;}

function drawPlane(x,y,p,alpha=1){
  ctx.globalAlpha=alpha;
  neon('#0ff',10);
  ctx.fillStyle='#005566';ctx.fillRect(rpx(x)-8,rpx(y)-16,16,32);
  ctx.fillStyle='#00ccdd';ctx.fillRect(rpx(x)-4,rpx(y)-20,8,8);ctx.fillRect(rpx(x)-6,rpx(y)-12,12,20);
  ctx.fillStyle='#00eeff';ctx.fillRect(rpx(x)-2,rpx(y)-24,4,8);
  if(p.wing){neon('#f0f',12);ctx.fillStyle='#660066';ctx.fillRect(rpx(x)-24,rpx(y)-4,16,8);ctx.fillRect(rpx(x)+8,rpx(y)-4,16,8);ctx.fillStyle='#ff44ff';ctx.fillRect(rpx(x)-28,rpx(y),8,4);ctx.fillRect(rpx(x)+20,rpx(y),8,4);}
  else{ctx.fillStyle='#003344';ctx.fillRect(rpx(x)-14,rpx(y),8,6);ctx.fillRect(rpx(x)+6,rpx(y),8,6);}
  if(p.engine){neon('#f80',14);ctx.fillStyle='#553300';ctx.fillRect(rpx(x)-10,rpx(y)+12,8,10);ctx.fillRect(rpx(x)+2,rpx(y)+12,8,10);ctx.fillStyle='#ff8800';ctx.fillRect(rpx(x)-9,rpx(y)+20,6,4);ctx.fillRect(rpx(x)+3,rpx(y)+20,6,4);if(frame%4<2){ctx.fillStyle='#ff4400';ctx.fillRect(rpx(x)-8,rpx(y)+24,4,6);ctx.fillRect(rpx(x)+4,rpx(y)+24,4,6);}}
  else{neon('#0ff',6);ctx.fillStyle='#003344';ctx.fillRect(rpx(x)-6,rpx(y)+14,5,8);ctx.fillRect(rpx(x)+1,rpx(y)+14,5,8);}
  if(p.turret>=1){neon('#ff0',10);ctx.fillStyle='#554400';ctx.fillRect(rpx(x)-14,rpx(y)-8,6,6);ctx.fillRect(rpx(x)+8,rpx(y)-8,6,6);ctx.fillStyle='#ffee00';ctx.fillRect(rpx(x)-12,rpx(y)-14,2,8);ctx.fillRect(rpx(x)+10,rpx(y)-14,2,8);}
  if(p.turret>=2){ctx.fillStyle='#ffee00';ctx.fillRect(rpx(x)-1,rpx(y)-26,2,10);}
  noNeon();
}

function getBossType(w){
  if(w===30)return 'final';
  const types=['spider','dragon','fortress','phantom','hydra','colossus'];
  return types[Math.floor(w/5-1)%types.length];
}

function drawBoss(e){
  if(!e.alive)return;
  const x=rpx(e.x),y=rpx(e.y),t=e.bossType,fl=frame;
  ctx.save();ctx.translate(x,y);
  if(t==='final'){
    neon('#f0f',30);ctx.fillStyle='#1a001a';ctx.fillRect(-70,-40,140,80);
    ctx.fillStyle='#660066';ctx.fillRect(-80,-20,20,40);ctx.fillRect(60,-20,20,40);
    ctx.fillStyle='#880088';ctx.fillRect(-90,-8,14,16);ctx.fillRect(76,-8,14,16);
    ctx.fillStyle='#aa00aa';ctx.fillRect(-60,-50,120,20);ctx.fillRect(-60,30,120,20);
    ctx.fillStyle='#ff00ff';ctx.fillRect(-20,-56,40,16);ctx.fillRect(-16,40,32,16);
    neon('#ff0',16);ctx.fillStyle='#ffff00';ctx.fillRect(-30,-12,20,20);ctx.fillRect(10,-12,20,20);
    ctx.fillStyle='#ff0000';ctx.fillRect(-24,-6,8,8);ctx.fillRect(16,-6,8,8);
    neon('#0ff',20);ctx.fillStyle=fl%20<10?'#00ffff':'#ff00ff';ctx.fillRect(-10,-10,20,20);
    neon('#f80',10);ctx.fillStyle='#ff8800';ctx.fillRect(-50,-40,8,8);ctx.fillRect(42,-40,8,8);ctx.fillRect(-50,32,8,8);ctx.fillRect(42,32,8,8);
    noNeon();ctx.fillStyle='#111';ctx.fillRect(-70,-58,140,8);
    let hp_pct=e.hp/e.maxHp;ctx.fillStyle=hp_pct>0.5?'#f0f':hp_pct>0.25?'#f80':'#f04';ctx.fillRect(-70,-58,140*hp_pct,8);
    ctx.fillStyle='#fff';ctx.font='9px monospace';ctx.textAlign='center';ctx.fillText('FINAL  '+e.hp+'/'+e.maxHp,0,-62);
  } else if(t==='spider'){
    neon('#f04',12);ctx.fillStyle='#440000';ctx.fillRect(-22,-16,44,32);
    ctx.fillStyle='#ff2200';ctx.fillRect(-30,-4,10,8);ctx.fillRect(20,-4,10,8);
    ctx.fillStyle='#ff4400';for(let i=-1;i<=1;i+=2){ctx.fillRect(i*34,-10,6,4);ctx.fillRect(i*34,6,6,4);}
    neon('#ff0',8);ctx.fillStyle='#ffff00';ctx.fillRect(-10,-8,8,8);ctx.fillRect(2,-8,8,8);
    noNeon();ctx.fillStyle='#111';ctx.fillRect(-22,-26,44,6);ctx.fillStyle='#f04';ctx.fillRect(-22,-26,44*(e.hp/e.maxHp),6);
  } else if(t==='dragon'){
    neon('#f80',14);ctx.fillStyle='#442200';ctx.fillRect(-28,-14,56,28);
    ctx.fillStyle='#ff6600';ctx.fillRect(-40,-6,14,12);ctx.fillRect(26,-6,14,12);ctx.fillRect(-10,-22,20,10);
    ctx.fillStyle='#ffaa00';ctx.fillRect(-6,-28,12,8);
    if(fl%8<4){neon('#ff0',12);ctx.fillStyle='#ffff00';ctx.fillRect(-4,-36,8,10);}
    neon('#f80',8);ctx.fillStyle='#ff4400';ctx.fillRect(-8,-10,6,6);ctx.fillRect(2,-10,6,6);
    noNeon();ctx.fillStyle='#111';ctx.fillRect(-28,-26,56,6);ctx.fillStyle='#f80';ctx.fillRect(-28,-26,56*(e.hp/e.maxHp),6);
  } else if(t==='fortress'){
    neon('#4af',10);ctx.fillStyle='#003355';ctx.fillRect(-32,-20,64,40);
    ctx.fillStyle='#0066aa';ctx.fillRect(-36,-8,8,16);ctx.fillRect(28,-8,8,16);ctx.fillRect(-16,-28,8,12);ctx.fillRect(8,-28,8,12);
    ctx.fillStyle='#00aaff';ctx.fillRect(-20,-32,6,6);ctx.fillRect(14,-32,6,6);
    neon('#0ff',10);ctx.fillStyle='#00ffff';ctx.fillRect(-4,-24,8,6);
    ctx.fillStyle=fl%6<3?'#fff':'#00ccff';ctx.fillRect(-26,-6,6,12);ctx.fillRect(20,-6,6,12);
    noNeon();ctx.fillStyle='#111';ctx.fillRect(-32,-40,64,6);ctx.fillStyle='#4af';ctx.fillRect(-32,-40,64*(e.hp/e.maxHp),6);
  } else if(t==='phantom'){
    ctx.globalAlpha=0.6+0.4*Math.sin(fl*0.05);
    neon('#a0f',16);ctx.fillStyle='#220044';ctx.fillRect(-26,-18,52,36);
    ctx.fillStyle='#8800ff';ctx.fillRect(-34,-8,12,16);ctx.fillRect(22,-8,12,16);ctx.fillRect(-8,-28,16,14);
    ctx.fillStyle='#aa44ff';ctx.fillRect(-14,-32,10,8);ctx.fillRect(4,-32,10,8);
    neon('#f0f',14);ctx.fillStyle='#ff88ff';ctx.fillRect(-8,-8,6,6);ctx.fillRect(2,-8,6,6);
    ctx.globalAlpha=1;noNeon();ctx.fillStyle='#111';ctx.fillRect(-26,-42,52,6);ctx.fillStyle='#a0f';ctx.fillRect(-26,-42,52*(e.hp/e.maxHp),6);
  } else if(t==='hydra'){
    neon('#0f8',12);ctx.fillStyle='#004422';ctx.fillRect(-30,-12,60,24);
    ctx.fillStyle='#00aa44';ctx.fillRect(-16,-28,10,18);ctx.fillRect(6,-28,10,18);ctx.fillRect(-38,-4,10,8);ctx.fillRect(28,-4,10,8);
    ctx.fillStyle='#00ff66';ctx.fillRect(-20,-36,8,10);ctx.fillRect(12,-36,8,10);
    if(fl%10<5){ctx.fillStyle='#aaffcc';ctx.fillRect(-18,-44,4,10);ctx.fillRect(14,-44,4,10);}
    neon('#ff0',8);ctx.fillStyle='#ffff44';ctx.fillRect(-22,-16,6,6);ctx.fillRect(16,-16,6,6);ctx.fillRect(-4,-20,8,6);
    noNeon();ctx.fillStyle='#111';ctx.fillRect(-30,-50,60,6);ctx.fillStyle='#0f8';ctx.fillRect(-30,-50,60*(e.hp/e.maxHp),6);
  } else { // colossus
    neon('#fa0',12);ctx.fillStyle='#332200';ctx.fillRect(-34,-22,68,44);
    ctx.fillStyle='#aa5500';ctx.fillRect(-44,-10,12,20);ctx.fillRect(32,-10,12,20);ctx.fillRect(-20,-32,40,12);ctx.fillRect(-18,24,36,10);
    ctx.fillStyle='#ffaa00';ctx.fillRect(-28,-28,12,10);ctx.fillRect(16,-28,12,10);
    ctx.fillStyle='#ff5500';ctx.fillRect(-8,-10,6,6);ctx.fillRect(2,-10,6,6);
    if(fl%6<3){neon('#f80',10);ctx.fillStyle='#ffcc00';ctx.fillRect(-16,-38,6,8);ctx.fillRect(10,-38,6,8);}
    noNeon();ctx.fillStyle='#111';ctx.fillRect(-34,-44,68,6);ctx.fillStyle='#fa0';ctx.fillRect(-34,-44,68*(e.hp/e.maxHp),6);
  }
  ctx.restore();noNeon();
}

function drawEnemy(e){
  if(!e.alive)return;
  if(e.isBoss){drawBoss(e);return;}
  ctx.globalAlpha=1;
  if(e.type===0){
    neon('#f04',8);ctx.fillStyle='#440011';ctx.fillRect(rpx(e.x)-10,rpx(e.y)-6,20,12);
    ctx.fillStyle='#ff0044';ctx.fillRect(rpx(e.x)-14,rpx(e.y)-2,6,4);ctx.fillRect(rpx(e.x)+8,rpx(e.y)-2,6,4);
    ctx.fillStyle='#ff4466';ctx.fillRect(rpx(e.x)-2,rpx(e.y)-8,4,4);
  } else {
    neon('#f80',10);ctx.fillStyle='#442200';ctx.fillRect(rpx(e.x)-8,rpx(e.y)-14,16,28);
    ctx.fillStyle='#ff6600';ctx.fillRect(rpx(e.x)-16,rpx(e.y),10,6);ctx.fillRect(rpx(e.x)+6,rpx(e.y),10,6);
    ctx.fillStyle='#ffaa00';ctx.fillRect(rpx(e.x)-3,rpx(e.y)-18,6,6);
    if(e.hp>1){noNeon();ctx.fillStyle='#fff';ctx.font='8px monospace';ctx.textAlign='center';ctx.fillText(e.hp,rpx(e.x),rpx(e.y)+4);}
  }
  noNeon();
}

const partColors={wing:'#ff44ff',engine:'#ff8800',turret:'#ffee00'};
function drawPart(p){
  let col=partColors[p.type]||'#fff';
  neon(col,12);let pulse=0.7+0.3*Math.sin(frame*0.1+p.x);
  ctx.globalAlpha=pulse;ctx.fillStyle=col;
  if(p.type==='wing'){ctx.fillRect(rpx(p.x)-10,rpx(p.y)-2,20,4);ctx.fillRect(rpx(p.x)-6,rpx(p.y)-6,12,12);}
  else if(p.type==='engine'){ctx.fillRect(rpx(p.x)-5,rpx(p.y)-8,10,16);ctx.fillRect(rpx(p.x)-8,rpx(p.y)+4,16,6);}
  else{ctx.fillRect(rpx(p.x)-6,rpx(p.y)-6,12,12);ctx.fillRect(rpx(p.x)-1,rpx(p.y)-14,2,10);}
  noNeon();ctx.globalAlpha=1;ctx.fillStyle=col;ctx.font='8px monospace';ctx.textAlign='center';
  ctx.fillText({wing:'WING',engine:'ENG',turret:'GUN'}[p.type],rpx(p.x),rpx(p.y)+22);noNeon();
}

// 부품: 적 처치 시 랜덤 드롭 (보스는 확정 드롭)
function tryDropPart(x,y,isBoss){
  const need=[];
  if(!plane.wing)need.push('wing');
  if(!plane.engine)need.push('engine');
  if(plane.turret<2)need.push('turret');
  if(need.length===0)return;
  const drop=isBoss||Math.random()<0.25;
  if(!drop)return;
  const type=need[Math.floor(Math.random()*need.length)];
  parts.push({x,y,type,dy:1.2});
}

function spawnWave(w){
  enemies=[];
  parts=[];
  const isBossWave=(w%5===0||w===30);
  if(isBossWave){
    const bt=getBossType(w);
    const hp=w===30?50:15+w*3;
    sfxBossAppear();
    enemies.push({
      x:W/2, y:w===30?90:65,
      w:w===30?140:64, h:w===30?80:36,
      hp, maxHp:hp,
      alive:true, isBoss:true, bossType:bt,
      dx:w===30?0.8:1.6, shootT:40, moveT:0, phase:0
    });
    startBGM('boss');
  } else {
    let cols=5+Math.min(w,4), rows=2;
    for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
      let t=Math.random()<0.4?1:0;
      enemies.push({
        x:60+c*((W-80)/cols), y:50+r*50,
        w:t?20:24, h:t?28:12,
        hp:1+(w>2&&t?1:0), maxHp:1+(w>2&&t?1:0),
        alive:true, isBoss:false, type:t,
        dx:(Math.random()<.5?1:-1)*(0.8+w*0.1),
        shootT:Math.random()*120|0
      });
    }
    if(bgmMode==='boss')startBGM('normal');
  }
}

function particle(x,y,col,n=10){
  for(let i=0;i<n;i++){
    let a=Math.random()*Math.PI*2,sp=Math.random()*3+1;
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:25+Math.random()*15|0,col});
  }
}

function shoot(){
  if(shootCD>0)return;
  if(plane.turret>=1)sfxShootPower();else sfxShoot();
  bullets.push({x:plane.x,y:plane.y-24,dy:-11,type:'p'});
  if(plane.turret>=1){bullets.push({x:plane.x-14,y:plane.y-12,dy:-11,type:'p'});bullets.push({x:plane.x+14,y:plane.y-12,dy:-11,type:'p'});}
  if(plane.turret>=2){bullets.push({x:plane.x-5,y:plane.y-28,dy:-11,dx:-0.6,type:'p'});bullets.push({x:plane.x+5,y:plane.y-28,dy:-11,dx:0.6,type:'p'});}
  shootCD=plane.turret>=1?8:14;
}

function reset(){
  score=0;wave=1;
  bullets=[];enemies=[];parts=[];particles=[];
  plane.x=W/2;plane.y=H-90;plane.wing=0;plane.engine=0;plane.turret=0;
  plane.hp=3;plane.speed=3;plane.invincible=0;plane.dashCD=0;plane.dashing=0;
  state='play';frame=0;
  spawnWave(wave);
  startBGM('normal');
}

function update(){
  frame++;
  stars.forEach(s=>{s.y+=s.sp;if(s.y>H)s.y=0;});
  if(state!=='play')return;

  let spd=plane.speed+(plane.wing?1.5:0)+(plane.engine?1:0);
  let mv=0;
  if(keys['ArrowLeft']||keys['a']||keys['A'])mv=-spd;
  if(keys['ArrowRight']||keys['d']||keys['D'])mv=spd;
  if(touchX!==null){if(touchX<plane.x-8)mv=-spd;else if(touchX>plane.x+8)mv=spd;}
  plane.x=Math.max(20,Math.min(W-20,plane.x+mv));
  if(plane.engine&&plane.dashCD===0&&(keys['Shift']||keys['z']||keys['Z'])){plane.dashing=12;plane.dashCD=90;}
  if(plane.dashing>0){plane.x+=mv>=0?8:-8;plane.dashing--;}
  if(plane.dashCD>0)plane.dashCD--;
  if(plane.invincible>0)plane.invincible--;
  if(shootCD>0)shootCD--;
  if(keys[' ']||keys['Space']||touchX!==null)shoot();

  // 총알
  bullets=bullets.filter(b=>{
    b.x+=(b.dx||0);b.y+=b.dy;
    if(b.x<0||b.x>W||b.y<0||b.y>H)return false;
    if(b.type==='p'){
      for(let e of enemies){
        if(!e.alive)continue;
        if(Math.abs(b.x-e.x)<e.w/2&&Math.abs(b.y-e.y)<e.h/2){
          e.hp--;
          if(e.hp<=0){
            e.alive=false;
            if(e.bossType==='final')sfxFinalExplode();
            else if(e.isBoss)sfxBigExplode();
            else sfxExplode();
            particle(e.x,e.y,e.isBoss?'#f0f':e.type===1?'#f80':'#f04',e.isBoss?30:12);
            score+=e.isBoss?(e.bossType==='final'?5000:500):e.type===1?30:10;
            tryDropPart(e.x,e.y,e.isBoss);
          } else if(e.isBoss){
            particle(e.x+Math.random()*40-20,e.y+Math.random()*20-10,'#f88',3);
          }
          return false;
        }
      }
    }
    if(b.type==='e'){
      if(plane.invincible===0&&Math.abs(b.x-plane.x)<10&&Math.abs(b.y-plane.y)<14){
        plane.hp--;plane.invincible=90;sfxHit();
        particle(plane.x,plane.y,'#0ff',12);
        if(plane.hp<=0){state='over';hi=Math.max(hi,score);stopBGM();}
        return false;
      }
    }
    return true;
  });

  // 적 이동/발사
  enemies.forEach(e=>{
    if(!e.alive)return;
    e.x+=e.dx;
    if(e.x>W-e.w/2-5||e.x<e.w/2+5)e.dx*=-1;
    if(e.isBoss){
      e.moveT++;
      if(e.hp<e.maxHp*0.5&&e.phase===0){e.phase=1;e.dx*=1.5;}
      if(e.hp<e.maxHp*0.25&&e.phase===1){e.phase=2;e.dx*=1.3;}
    }
    e.shootT--;
    if(e.shootT<=0){
      if(e.isBoss){
        let ang=Math.atan2(plane.y-e.y,plane.x-e.x);
        const spread=e.bossType==='final'?5:e.phase>=1?4:3;
        for(let i=-(spread-1)/2;i<=(spread-1)/2;i++)
          bullets.push({x:e.x,y:e.y+e.h/2,dy:3+(e.phase||0),dx:Math.cos(ang+i*0.28)*(3+(e.phase||0)),type:'e'});
        if(e.bossType==='final'){
          bullets.push({x:e.x-60,y:e.y,dy:4,dx:-1.5,type:'e'});
          bullets.push({x:e.x+60,y:e.y,dy:4,dx:1.5,type:'e'});
        }
        e.shootT=e.bossType==='final'?22:Math.max(10,35-e.phase*8);
      } else {
        bullets.push({x:e.x,y:e.y+12,dy:3+wave*0.08,type:'e'});
        e.shootT=80+Math.random()*80|0;
      }
    }
    // 충돌
    if(plane.invincible===0&&Math.abs(e.x-plane.x)<(e.w/2+10)&&Math.abs(e.y-plane.y)<(e.h/2+14)){
      plane.hp--;plane.invincible=90;sfxHit();
      particle(plane.x,plane.y,'#0ff',12);
      if(plane.hp<=0){state='over';hi=Math.max(hi,score);stopBGM();}
    }
  });

  // 부품 획득
  parts=parts.filter(p=>{
    p.y+=p.dy;
    if(Math.abs(p.x-plane.x)<18&&Math.abs(p.y-plane.y)<22){
      sfxPickup();
      if(p.type==='wing'&&!plane.wing)plane.wing=1;
      else if(p.type==='engine'&&!plane.engine)plane.engine=1;
      else if(p.type==='turret'&&plane.turret<2)plane.turret++;
      particle(plane.x,plane.y,partColors[p.type],15);
      return false;
    }
    return p.y<H;
  });

  particles=particles.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.life--;return p.life>0;});

  // 웨이브 클리어: 적 전멸 시 바로 다음 웨이브
  if(enemies.length>0&&enemies.every(e=>!e.alive)){
    wave++;spawnWave(wave);
  }
}

function draw(){
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#06000f';ctx.fillRect(0,0,W,H);
  stars.forEach(s=>{let b=0.3+s.b*0.7;ctx.fillStyle=`rgba(180,180,255,${b})`;ctx.fillRect(rpx(s.x),rpx(s.y),s.s>1?2:1,s.s>1?2:1);});
  cityLights.forEach(l=>{let on=(frame+l.blink)%60<45;ctx.globalAlpha=on?0.6:0.15;ctx.fillStyle=l.c;ctx.fillRect(rpx(l.x),rpx(l.y),l.w,l.h);});
  ctx.globalAlpha=1;

  if(state==='start'){
    neon('#0ff',20);ctx.fillStyle='#00ffff';ctx.font='bold 20px monospace';ctx.textAlign='center';
    ctx.fillText('FRAGMENT FIGHTER',W/2,H/2-110);noNeon();
    ctx.fillStyle='#ff44ff';ctx.font='11px monospace';ctx.fillText('분리된 비행기를 합체하라!',W/2,H/2-84);
    drawPlane(W/2-55,H/2-10,{wing:0,engine:0,turret:0,invincible:0});
    neon('#ff44ff',8);ctx.fillStyle='#ff44ff';ctx.globalAlpha=0.9;
    ctx.fillRect(W/2+16,H/2-16,20,4);ctx.fillRect(W/2+12,H/2-20,12,12);noNeon();
    drawPlane(W/2+65,H/2-10,{wing:1,engine:1,turret:2,invincible:0});
    ctx.fillStyle='#666';ctx.font='9px monospace';
    ctx.fillText('적 처치 시 랜덤 부품 드롭 · 보스 확정 드롭',W/2,H/2+34);
    ctx.fillText('5웨이브마다 보스 · 30웨이브 최종보스(HP50)',W/2,H/2+50);
    neon('#0ff',8);ctx.fillStyle='#00ffff';ctx.font='14px monospace';
    ctx.fillText('▶  클릭 또는 스페이스로 시작  ◀',W/2,H/2+88);noNeon();
    ctx.fillStyle='#444';ctx.font='9px monospace';ctx.fillText('M: 음소거',W/2,H/2+112);
    return;
  }
  if(state==='over'){
    neon('#f04',16);ctx.fillStyle='#ff2244';ctx.font='bold 26px monospace';ctx.textAlign='center';
    ctx.fillText('GAME OVER',W/2,H/2-60);noNeon();
    ctx.fillStyle='#0ff';ctx.font='14px monospace';ctx.fillText('점수: '+score,W/2,H/2-20);
    ctx.fillStyle='#f0f';ctx.fillText('최고: '+hi,W/2,H/2+10);
    ctx.fillStyle='#888';ctx.font='11px monospace';ctx.fillText('웨이브 '+wave+' 도달',W/2,H/2+36);
    neon('#0ff',8);ctx.fillStyle='#0ff';ctx.font='12px monospace';
    ctx.fillText('클릭 또는 스페이스로 재도전',W/2,H/2+62);noNeon();
    return;
  }

  parts.forEach(drawPart);
  bullets.forEach(b=>{
    if(b.type==='p'){neon('#0ff',8);ctx.fillStyle='#00ffff';}
    else{neon('#f04',6);ctx.fillStyle='#ff4444';}
    ctx.fillRect(rpx(b.x)-2,rpx(b.y)-5,4,10);noNeon();
  });
  enemies.forEach(drawEnemy);
  let showPlane=plane.invincible===0||(frame%6<3);
  if(showPlane)drawPlane(plane.x,plane.y,plane,1);
  particles.forEach(p=>{ctx.globalAlpha=p.life/40;ctx.fillStyle=p.col;ctx.fillRect(rpx(p.x)-2,rpx(p.y)-2,4,4);});
  ctx.globalAlpha=1;

  // HUD 상단
  noNeon();ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(0,0,W,28);
  neon('#0ff',4);ctx.fillStyle='#00ffff';ctx.font='11px monospace';ctx.textAlign='left';
  ctx.fillText('SCORE:'+score,8,18);
  ctx.textAlign='right';ctx.fillText('WAVE:'+wave+(wave===30?' ★':''),W-8,18);noNeon();
  ctx.textAlign='center';
  for(let i=0;i<plane.maxHp;i++){ctx.fillStyle=i<plane.hp?'#f04':'#222';ctx.fillRect(W/2-24+i*16,8,12,10);}

  // HUD 하단
  ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(0,H-26,W,26);
  [{label:'WING',val:plane.wing,col:'#ff44ff'},{label:'ENG',val:plane.engine,col:'#ff8800'},{label:'GUN×'+plane.turret,val:plane.turret,col:'#ffee00'}]
    .forEach((h,i)=>{
      let x=70+i*110;ctx.fillStyle=h.val?h.col:'#333';neon(h.val?h.col:'#000',h.val?5:0);
      ctx.font='10px monospace';ctx.textAlign='center';
      ctx.fillText(h.label+':'+(h.val?'ON':'--'),x,H-8);noNeon();
    });
  if(plane.engine){
    ctx.fillStyle=plane.dashCD>0?'#444':'#ff8800';ctx.font='9px monospace';ctx.textAlign='center';
    ctx.fillText('DASH:'+(plane.dashCD>0?Math.ceil(plane.dashCD/60)+'s':'RDY'),320,H-8);
  }
  ctx.fillStyle=muted?'#f04':'#555';ctx.font='9px monospace';ctx.textAlign='right';ctx.fillText(muted?'MUTE':'M:뮤트',W-6,H-8);

  // 보스 알림
  const activeBoss=enemies.find(e=>e.isBoss&&e.alive);
  if(activeBoss&&frame%40<20){
    neon(activeBoss.bossType==='final'?'#f0f':'#f80',12);
    ctx.fillStyle=activeBoss.bossType==='final'?'#ff00ff':'#ffaa00';
    ctx.font='bold 12px monospace';ctx.textAlign='center';
    ctx.fillText(activeBoss.bossType==='final'?'★ FINAL BOSS ★':'BOSS WAVE '+wave,W/2,46);noNeon();
  }
}

function loop(){update();draw();requestAnimationFrame(loop);}
loop();

window.addEventListener('keydown',e=>{
  keys[e.key]=true;if(e.key===' ')e.preventDefault();
  if(e.key==='m'||e.key==='M'){muted=!muted;if(muted)stopBGM();else if(state==='play')startBGM(bgmMode);}
  if(e.key===' '&&state!=='play')reset();
});
window.addEventListener('keyup',e=>{keys[e.key]=false;});
cv.addEventListener('touchstart',e=>{e.preventDefault();if(state!=='play'){reset();return;}touchX=e.touches[0].clientX-cv.getBoundingClientRect().left;},{passive:false});
cv.addEventListener('touchmove',e=>{e.preventDefault();touchX=e.touches[0].clientX-cv.getBoundingClientRect().left;},{passive:false});
cv.addEventListener('touchend',e=>{e.preventDefault();setTimeout(()=>{touchX=null;},80);},{passive:false});
cv.addEventListener('click',()=>{if(state!=='play')reset();});
</script>
</body>
</html>
